<div class="flashcard-set-selector-container">
  <button class="back-button" (click)="goBack()" type="button">
    ← Back to Games
  </button>

  <div class="header-section">
    <h1>Choose Flashcard Sets</h1>
    <p class="instruction">Select one or more flashcard sets to use in the game</p>
  </div>

  <div class="sets-grid">
    <div
      *ngFor="let set of sets"
      [class]="'set-card set-' + set.id"
      [class.selected]="isSetSelected(set.id)"
      (click)="toggleSet(set.id)">
      <div class="checkbox-wrapper">
        <input
          type="checkbox"
          [checked]="isSetSelected(set.id)"
          (click)="$event.stopPropagation()"
          (change)="toggleSet(set.id)"
          [id]="'set-' + set.id"
          class="custom-checkbox">
        <label [for]="'set-' + set.id" class="checkbox-label"></label>
      </div>
      <div class="set-content">
        <h2>{{ set.name }}</h2>
        <p>{{ set.description }}</p>
        <div class="card-count-badge">
          <span class="count-icon">📚</span>
          <span class="count-text">{{ set.flashcardIds.length }} {{ set.flashcardIds.length === 1 ? 'card' : 'cards' }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button
      class="start-game-button"
      (click)="startGame()"
      [disabled]="selectedSetIds.length === 0"
      type="button">
      <span class="button-text">Start Game</span>
      <span class="button-icon" *ngIf="selectedSetIds.length > 0">→</span>
    </button>
  </div>
</div>
