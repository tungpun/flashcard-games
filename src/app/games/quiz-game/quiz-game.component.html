<div class="quiz-game-container">
  <button class="back-button" (click)="goBack()" type="button">
    ← Back to Game Selection
  </button>

  <div *ngIf="selectedSets.length > 0 && !quizComplete" class="quiz-header">
    <h2 class="game-title">
      {{ selectedSets.length === 1 ? selectedSets[0].name : (selectedSets.length + ' Sets') }}
    </h2>
    <div class="quiz-stats">
      <span class="stat">Question {{ currentQuestionIndex + 1 }}/{{ questions.length }}</span>
      <span class="stat">Score: {{ score }}/{{ questions.length }}</span>
    </div>
  </div>

  <fg-game-completion
    *ngIf="quizComplete"
    title="🎉 Quiz Complete! 🎉"
    [message]="getCompletionMessage()"
    (restart)="restartQuiz()">
  </fg-game-completion>

  <div *ngIf="selectedSets.length > 0 && !quizComplete && getCurrentQuestion()" class="quiz-content">
    <div class="question-image">
      <img [src]="getCurrentQuestion()!.flashcard.imageUrl" [alt]="getCurrentQuestion()!.flashcard.caption" />
    </div>

    <div class="question-text">
      <h3>What is this?</h3>
    </div>

    <div class="options-grid">
      <button
        *ngFor="let option of getCurrentQuestion()!.options"
        class="option-button"
        [class.selected]="selectedAnswer === option.caption"
        [class.correct]="showResult && option.isCorrect"
        [class.incorrect]="showResult && selectedAnswer === option.caption && !option.isCorrect"
        [class.disabled]="showResult"
        (click)="selectAnswer(option)"
        type="button">
        <fg-highlighted-caption
          [caption]="option.caption"
          [patterns]="getHighlightPatterns(option.flashcardId)">
        </fg-highlighted-caption>
        <span *ngIf="showResult && option.isCorrect" class="result-icon">✓</span>
        <span *ngIf="showResult && selectedAnswer === option.caption && !option.isCorrect" class="result-icon">✗</span>
      </button>
    </div>

    <div *ngIf="showResult" class="result-message">
      <div [class]="'message ' + (isCorrect ? 'correct' : 'incorrect')">
        <p *ngIf="isCorrect">🎉 Correct!</p>
        <p *ngIf="!isCorrect">
          ❌ Wrong. The correct answer is:
          <fg-highlighted-caption
            [caption]="getCurrentQuestion()!.flashcard.caption"
            [patterns]="getHighlightPatterns(getCurrentQuestion()!.flashcard.id)">
          </fg-highlighted-caption>
        </p>
      </div>
      <button class="next-button" (click)="nextQuestion()" type="button">
        {{ currentQuestionIndex + 1 < questions.length ? 'Next Question' : 'Finish Quiz' }}
      </button>
    </div>
  </div>
</div>
